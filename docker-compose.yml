version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-migrations:
    image: migrate/migrate:latest
    volumes:
      - ./auth_service/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/auth?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  room-migrations:
    image: migrate/migrate:latest
    volumes:
      - ./room_service/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/room?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  booking-migrations:
    image: migrate/migrate:latest
    volumes:
      - ./booking_service/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/booking?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=auth
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-min-32-chars-long!!!}
      - JWT_ACCESS_EXPIRY=168h
      - PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      auth-migrations:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  room-service:
    build:
      context: ./room_service
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=room
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-min-32-chars-long!!!}
      - JWT_ACCESS_EXPIRY=168h
      - PORT=8082
      - ROOM_SERVICE_ADDR=9090
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      room-migrations:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  booking-service:
    build:
      context: ./booking_service
      dockerfile: Dockerfile
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=booking
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-min-32-chars-long!!!}
      - JWT_ACCESS_EXPIRY=168h
      - PORT=8083
      - ROOM_SERVICE_ADDR=room-service:9090
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      booking-migrations:
        condition: service_completed_successfully
      room-service:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      - AUTH_SERVICE_ADDR=http://auth-service:8081
      - ROOM_SERVICE_ADDR=http://room-service:8082
      - BOOKING_SERVICE_ADDR=http://booking-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - room-service
      - booking-service
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge